# Mirror the Forgejo repo (source of truth) to GitHub every night.
# Also runnable manually from the Actions tab via workflow_dispatch.

name: Mirror from Forgejo

on:
  schedule:
    - cron: "0 3 * * *" # nightly at 03:00 UTC
  workflow_dispatch: # manual trigger

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitHub repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch from Forgejo and push
        run: |
          git remote add forgejo https://forgejo.hearthhome.lol/Saltfault/Starling-TUI.git || true
          git fetch forgejo main
          git push origin forgejo/main:main
